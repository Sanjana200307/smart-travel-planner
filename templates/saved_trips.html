<!DOCTYPE html>
<html>
<head>
    <title>Saved Trips</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">
<div class="card">

<h1>❤️ Saved Trips</h1>

<table>
<tr>
    <th>Place</th>
    <th>Days</th>
    <th>Budget</th>
</tr>

{% for trip in trips %}
<tr>
    <td>{{ trip[0] }}</td>
    <td>{{ trip[1] }}</td>
    <td>₹{{ trip[2] }}</td>
</tr>
{% endfor %}

</table>

<br>

<a href="/">⬅ Back Home</a>

</div>
</div>

</body>
</html>
